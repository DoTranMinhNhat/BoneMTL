# configs/default.yaml

data:
  data_dir: ./data
  img_size: 256
  batch_size: 8
  num_workers: 0        # Windows dùng 0
  train_ratio: 0.70
  val_ratio: 0.15
  seed: 42
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  backbone: resnet50
  pretrained: true
  num_classes: 9     # tầng 3

training:
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  lambda_tier1: 1.0     # weight của loss tầng 1
  lambda_tier2: 1.0     # weight của loss tầng 2
  lambda_tier3: 1.0     # weight của loss tầng 3
  lambda_seg: 1.0       # weight của loss segmentation

  # Class weights tầng 2
  tier2_pos_weight: 4.5

  # Class weights tầng 3
  tier3_weights:
    - 0.37   # osteochondroma    (754 ảnh — nhiều nhất nên weight thấp)
    - 1.06   # multiple osteo    (263 ảnh)
    - 1.35   # simple bone cyst  (206 ảnh)
    - 3.00   # giant cell tumor  (93 ảnh)
    - 6.30   # osteofibroma      (44 ảnh — ít nhất nên weight cao)
    - 5.43   # synovial osteo    (51 ảnh)
    - 2.41   # other bt          (115 ảnh)
    - 0.88   # osteosarcoma      (297 ảnh)
    - 5.83   # other mt          (45 ảnh)

checkpoint:
  save_dir: ./checkpoints
  save_best_only: true
  monitor: val_dice      # metric